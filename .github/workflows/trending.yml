name: GitHub Trending to Notion

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch repositories
        run: |
          curl https://api.github.com/search/repositories?q=stars:>10000&sort=stars&order=desc&per_page=5 > repos.json

      - name: Send to Notion
        run: |
          python3 <<EOF
import requests, json, os, datetime

token = os.environ["NOTION_TOKEN"]
db = os.environ["DATABASE_ID"]

data = json.load(open("repos.json"))

for repo in data["items"]:
    payload = {
      "parent": {"database_id": db},
      "properties": {
        "name": {
          "title": [{"text": {"content": repo["name"]}}]
        },
        "link": {
          "url": repo["html_url"]
        },
        "star": {
          "number": repo["stargazers_count"]
        },
        "introduction": {
          "rich_text": [{"text": {"content": repo["description"] or ""}}]
        },
        "date": {
          "date": {"start": datetime.date.today().isoformat()}
        }
      }
    }

    requests.post(
      "https://api.notion.com/v1/pages",
      headers={
        "Authorization": f"Bearer {token}",
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
      },
      json=payload
    )
EOF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
